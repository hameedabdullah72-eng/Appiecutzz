<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppieCutzz - Boeken</title>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1b2e;
      color: white;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      background: #111827;
      border-bottom: 3px solid #c8a84b;
    }

    h1 {
      color: #c8a84b;
      font-size: 42px;
      margin-bottom: 5px;
    }

    .container {
      max-width: 650px;
      margin: 30px auto;
      background: #122040;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(200,168,75,0.25);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      color: #c8a84b;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 7px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
      box-sizing: border-box;
    }

    input, select {
      background: #1a2d50;
      color: white;
      border: 1px solid #c8a84b;
    }

    button {
      background: #c8a84b;
      color: #0d1b2e;
      font-weight: bold;
      margin-top: 20px;
      cursor: pointer;
    }

    button:hover {
      background: #e2c97e;
    }

    .time-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .time-btn {
      background: #1a2d50;
      color: white;
      border: 1px solid #c8a84b;
      margin-top: 0;
      cursor: pointer;
    }

    .time-btn.selected {
      background: #c8a84b;
      color: #0d1b2e;
    }

    .price {
      margin-top: 20px;
      font-size: 22px;
      color: #c8a84b;
      font-weight: bold;
      text-align: center;
    }

    .message {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .success {
      background: #123d1f;
      color: #8cffaa;
    }

    .error {
      background: #3d1212;
      color: #ff8c8c;
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #ddd;
      line-height: 1.7;
    }

    @media (max-width: 600px) {
      .container {
        margin: 15px;
      }

      .time-options {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

<header>
  <h1>AppieCutzz</h1>
  <p>Premium Barber - Boek makkelijk je afspraak</p>
</header>

<div class="container">
  <h2>Afspraak boeken</h2>

  <form id="bookingForm">
    <label>Naam</label>
    <input type="text" id="name" required>

    <label>Telefoonnummer</label>
    <input type="tel" id="phone" required>

    <label>E-mail</label>
    <input type="email" id="email" required>

    <label>Datum</label>
    <input type="date" id="date" required>

    <label>Tijd</label>
    <div class="time-options" id="timeOptions">
      <p>Kies eerst een datum</p>
    </div>
    <input type="hidden" id="time" required>

    <label>Optie</label>
    <select id="service" required>
      <option value="">Kies een optie</option>
      <option value="Knippen">Knippen - €10</option>
      <option value="Baard">Baard - €10</option>
      <option value="Knippen + Baard">Knippen + Baard - €10</option>
      <option value="Taper/Fade">Taper/Fade - €10</option>
    </select>

    <label>
      <input type="checkbox" id="drink" style="width:auto;">
      Drinken erbij + €1,50
    </label>

    <div class="price" id="price">Totaal: €10,00</div>

    <button type="submit" id="submitBtn">Boeking maken</button>
  </form>

  <div id="message" class="message"></div>
</div>

<footer>
  <strong>Openingstijden</strong><br>
  Maandag: 15:30 - 18:30<br>
  Dinsdag: 15:30 - 20:00<br>
  Woensdag: 15:30 - 18:30<br>
  Donderdag: 15:30 - 20:00<br>
  Vrijdag: 16:45 - 20:00<br>
  Zaterdag & zondag: gesloten
</footer>

<script>
  emailjs.init({
    publicKey: "Y5ZRYgbti5gohuVmx"
  });

  const SERVICE_ID = "service_wo5zzw1";
  const TEMPLATE_ID = "template_x8i5nwh";

  const form = document.getElementById("bookingForm");
  const drink = document.getElementById("drink");
  const price = document.getElementById("price");
  const message = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");
  const dateInput = document.getElementById("date");
  const timeInput = document.getElementById("time");
  const timeOptions = document.getElementById("timeOptions");

  drink.addEventListener("change", updatePrice);
  dateInput.addEventListener("change", generateTimes);

  const today = new Date();
  dateInput.min = today.toISOString().split("T")[0];

  function updatePrice() {
    const total = drink.checked ? 11.50 : 10;
    price.textContent = "Totaal: €" + total.toFixed(2).replace(".", ",");
  }

  function generateTimes() {
    const dateValue = dateInput.value;
    timeInput.value = "";
    timeOptions.innerHTML = "";

    if (!dateValue) {
      timeOptions.innerHTML = "<p>Kies eerst een datum</p>";
      return;
    }

    const date = new Date(dateValue + "T00:00:00");
    const day = date.getDay();

    let start = "";
    let end = "";

    if (day === 1 || day === 3) {
      start = "15:30";
      end = "18:30";
    } else if (day === 2 || day === 4) {
      start = "15:30";
      end = "20:00";
    } else if (day === 5) {
      start = "16:45";
      end = "20:00";
    } else {
      timeOptions.innerHTML = "<p>Gesloten op deze dag</p>";
      return;
    }

    const times = createTimeSlots(start, end, 30);

    times.forEach(function(time) {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.textContent = time;
      btn.className = "time-btn";

      btn.addEventListener("click", function() {
        document.querySelectorAll(".time-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        timeInput.value = time;
      });

      timeOptions.appendChild(btn);
    });
  }

  function createTimeSlots(start, end, interval) {
    const slots = [];
    let current = timeToMinutes(start);
    const last = timeToMinutes(end);

    while (current + interval <= last) {
      slots.push(minutesToTime(current));
      current += interval;
    }

    return slots;
  }

  function timeToMinutes(time) {
    const parts = time.split(":");
    return Number(parts[0]) * 60 + Number(parts[1]);
  }

  function minutesToTime(minutes) {
    const h = Math.floor(minutes / 60);
    const m = minutes % 60;
    return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const email = document.getElementById("email").value.trim();
    const date = dateInput.value;
    const time = timeInput.value;
    const service = document.getElementById("service").value;
    const hasDrink = drink.checked;
    const total = hasDrink ? "€11,50" : "€10,00";

    if (!time) {
      showMessage("Kies eerst een tijdslot.", "error");
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Bezig met verzenden...";

    try {
      await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        klant_naam: name,
        klant_tel: phone,
        klant_email: email,
        datum: date,
        tijdslot: time,
        dienst: service,
        prijs: total,
        opmerking: hasDrink ? "Drankje erbij" : "Geen drankje",
        to_email: "hameedabdullah72@gmail.com",
        email: "hameedabdullah72@gmail.com"
      });

      showMessage("Boeking gelukt! AppieCutzz heeft je afspraak ontvangen.", "success");

      form.reset();
      timeOptions.innerHTML = "<p>Kies eerst een datum</p>";
      timeInput.value = "";
      updatePrice();

    } catch (error) {
      console.log(error);
      showMessage("Mail versturen mislukt. Check EmailJS Email History.", "error");
    }

    submitBtn.disabled = false;
    submitBtn.textContent = "Boeking maken";
  });

  function showMessage(text, type) {
    message.textContent = text;
    message.className = "message " + type;
    message.style.display = "block";
  }
</script>

</body>
</html>

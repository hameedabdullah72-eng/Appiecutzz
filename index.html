  (function animateCursor() {

const schedule = {
  0: { s: [12, 30], e: [16, 0] },
  1: { s: [12, 30], e: [16, 0] },
  2: { s: [12, 30], e: [16, 0] },
  3: { s: [12, 30], e: [16, 0] },
  4: { s: [12, 30], e: [16, 0] },
  5: { s: [12, 30], e: [16, 0] },
  6: { s: [12, 30], e: [16, 0] }
};

const NL_DAYS = ["zondag","maandag","dinsdag","woensdag","donderdag","vrijdag","zaterdag"];
const MONTHS = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];

const CLOSED_DATE_RANGES = [
  {
    start: "2026-07-15",
    end: "2026-07-22",
    message: "Ik ben van 15 juli t/m 22 juli op vakantie. In deze periode kun je geen afspraak maken."
  }
];

function getClosedRange(dateValue) {
  return CLOSED_DATE_RANGES.find(range => dateValue >= range.start && dateValue <= range.end);
}

function getServiceDuration(service) {
  if (service === "Knippen met baard") return 45;
  return 35;
}

function getServicePrice(service) {
  return service === "Knippen met baard" ? 12.5 : 10;
}

function getSlots(dayIndex) {
  const day = schedule[dayIndex];
  if (!day) return [];

  const service = document.getElementById("service")?.value || "Knippen met bovenkant";
  const duration = getServiceDuration(service);

  let out = [];
  let h = day.s[0];
  let m = day.s[1];

  while (h * 60 + m + duration <= day.e[0] * 60 + day.e[1]) {
    out.push(String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0"));
    m += duration;

    if (m >= 60) {
      h += Math.floor(m / 60);
      m = m % 60;
    }
  }

  return out;
}

const BOOKED_SLOTS_KEY = "appiecutzz_booked_slots_v1";
const FIXED_BOOKED_SLOTS = {};
const REMOTE_BOOKED_SLOTS = {};

function bookingApiConfigured() {
  return BOOKING_API_URL && !BOOKING_API_URL.includes("PASTE_GOOGLE_APPS_SCRIPT");
}

function bookingApiRequest(action, params) {
  if (!bookingApiConfigured()) {
    return Promise.resolve({ ok: true, local: true, booked: [] });
  }

  return new Promise((resolve, reject) => {
    const callback = "appiecutzzCallback" + Date.now() + Math.floor(Math.random() * 1000);
    const script = document.createElement("script");
    const data = new URLSearchParams({ action, callback, ...params });

    window[callback] = response => {
      resolve(response || {});
      script.remove();
      delete window[callback];
    };

    script.onerror = () => {
      reject(new Error("Booking API niet bereikbaar"));
      script.remove();
      delete window[callback];
    };

    script.src = BOOKING_API_URL + "?" + data.toString();
    document.body.appendChild(script);
  });
}

async function loadOnlineBookedSlots(dateValue) {
  if (!dateValue || !bookingApiConfigured()) return;

  const data = await bookingApiRequest("list", { date: dateValue });
  REMOTE_BOOKED_SLOTS[dateValue] = Array.isArray(data.booked) ? data.booked : [];
}

async function bookOnlineSlot(payload) {
  if (!bookingApiConfigured()) return { ok: true, local: true };
  return bookingApiRequest("book", payload);
}

function getBookedSlots() {
  let saved = {};

  try {
    saved = JSON.parse(localStorage.getItem(BOOKED_SLOTS_KEY)) || {};
  } catch (e) {
    saved = {};
  }

  const booked = { ...FIXED_BOOKED_SLOTS };

  [saved, REMOTE_BOOKED_SLOTS].forEach(source => {
    Object.keys(source).forEach(date => {
      const current = booked[date] || [];
      const extra = Array.isArray(source[date]) ? source[date] : [];
      booked[date] = Array.from(new Set([...current, ...extra]));
    });
  });

  return booked;
}

function isBookedSlot(dateValue, time) {
  const booked = getBookedSlots();
  return Array.isArray(booked[dateValue]) && booked[dateValue].includes(time);
}

function saveBookedSlot(dateValue, time) {
  if (!dateValue || !time) return;

  let saved = {};

  try {
    saved = JSON.parse(localStorage.getItem(BOOKED_SLOTS_KEY)) || {};
  } catch (e) {
    saved = {};
  }

  if (!Array.isArray(saved[dateValue])) saved[dateValue] = [];
  if (!saved[dateValue].includes(time)) saved[dateValue].push(time);

  localStorage.setItem(BOOKED_SLOTS_KEY, JSON.stringify(saved));
}

function renderTimeSlots(dateValue, dayIndex) {
  const container = document.getElementById("time-options");
  document.getElementById("time").value = "";
  container.innerHTML = "";

  const availableSlots = getSlots(dayIndex).filter(t => !isBookedSlot(dateValue, t));

  if (!availableSlots.length) {
    container.innerHTML =
      "<span style=\"font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:rgba(240,236,228,.25);\">Geen tijden meer beschikbaar op deze dag</span>";
    return;
  }

  availableSlots.forEach(t => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "time-btn";
    button.textContent = t;

    button.onclick = () => {
      if (isBookedSlot(dateValue, t)) {
        showAlert("Dit tijdslot is al geboekt. Kies een andere tijd.", "err");
        renderTimeSlots(dateValue, dayIndex);
        return;
      }

      document.querySelectorAll(".time-btn").forEach(x => x.classList.remove("selected"));
      button.classList.add("selected");
      document.getElementById("time").value = t;
    };

    container.appendChild(button);
  });
}

const today = new Date();
document.getElementById("date").min =
  today.getFullYear() + "-" +
  String(today.getMonth() + 1).padStart(2, "0") + "-" +
  String(today.getDate()).padStart(2, "0");

document.getElementById("date").addEventListener("change", async function () {
  const [y, mo, d] = this.value.split("-").map(Number);
  const date = new Date(y, mo - 1, d);
  const dayIndex = date.getDay();
  const container = document.getElementById("time-options");
  const err = document.getElementById("dateErr");

  document.getElementById("time").value = "";
  window._selectedDateValue = this.value;

  const closedRange = getClosedRange(this.value);

  if (!schedule[dayIndex] || closedRange) {
    err.textContent = closedRange ? closedRange.message : "Deze dag is gesloten.";
    err.classList.add("show");
    container.innerHTML =
      "<span style=\"font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:rgba(240,236,228,.25);\">" +
      (closedRange ? "Niet beschikbaar in deze periode" : "Gesloten op deze dag") +
      "</span>";
    window._dateLabel = "";
    window._selectedDateValue = "";
    return;
  }

  err.textContent = "Deze dag is gesloten.";
  err.classList.remove("show");

  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  window._dateLabel = cap(NL_DAYS[dayIndex]) + " " + d + " " + MONTHS[mo - 1] + " " + y;

  container.innerHTML =
    "<span style=\"font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.1em;color:rgba(240,236,228,.25);\">Tijden laden...</span>";

  try {
    await loadOnlineBookedSlots(this.value);
  } catch (err) {
    console.error(err);
  }

  renderTimeSlots(this.value, dayIndex);
});

function refreshSlotsForSelectedService() {
  const dateValue = document.getElementById("date").value;
  if (!dateValue) return;

  const [y, mo, d] = dateValue.split("-").map(Number);
  const dayIndex = new Date(y, mo - 1, d).getDay();

  if (schedule[dayIndex] && !getClosedRange(dateValue)) {
    renderTimeSlots(dateValue, dayIndex);
  }
}

document.getElementById("service").addEventListener("change", function () {
  updatePrice();
  refreshSlotsForSelectedService();
});

document.getElementById("drink").addEventListener("change", updatePrice);

function updatePrice() {
  const service = document.getElementById("service").value;
  const hasDrink = document.getElementById("drink").checked;

  let total = getServicePrice(service);
  if (hasDrink && !document.getElementById("drink").disabled) total += 1.5;

  document.getElementById("priceTotal").innerHTML = "&#8364;" + total.toFixed(2).replace(".", ",");
}
